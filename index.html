<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: rgba(255,255,255,0.07);
      --accent: #7c5cbf;
      --accent2: #a881ff;
      --red: #e94560;
      --text: #f0f0f0;
      --text-dim: #888;
      --num-bg: #1e1e1e;
      --num-hover: #2a2a2a;
      --op-bg: #2e1f4f;
      --op-hover: #3d2966;
      --util-bg: #1f2937;
      --util-hover: #293547;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      padding: 16px;
    }

    /* Wrapper */
    .wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    /* History panel */
    .history-panel {
      width: 200px;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 16px 12px;
      max-height: 540px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }

    .history-panel h3 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .history-list {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-item {
      background: var(--surface2);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .history-item:hover { background: var(--op-bg); }

    .history-item .h-expr {
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item .h-result {
      font-size: 15px;
      font-weight: 500;
      color: var(--accent2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-empty {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 12px;
    }

    .btn-clear-hist {
      font-size: 11px;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-clear-hist:hover { border-color: var(--red); color: var(--red); }

    /* Calculator */
    .calc {
      background: var(--surface);
      border-radius: 24px;
      padding: 20px;
      width: 340px;
      border: 1px solid var(--border);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    /* Mode bar */
    .mode-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .mode-toggle {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }

    .mode-toggle button {
      height: auto;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 8px;
      border: none;
      background: none;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-toggle button.active {
      background: var(--accent);
      color: #fff;
    }
    .mode-toggle button:active { transform: none; }

    .angle-toggle {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent2);
      background: var(--op-bg);
      border: none;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .angle-toggle:active { transform: scale(0.93); }

    /* Display */
    .display {
      background: var(--surface2);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      text-align: right;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    .display::after {
      content: attr(data-copy);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .display.copied::after { opacity: 1; }

    .display .memory-indicator {
      position: absolute;
      top: 10px;
      left: 12px;
      font-size: 10px;
      font-weight: 600;
      color: var(--accent2);
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .display .memory-indicator.visible { opacity: 1; }

    .display .expression {
      color: var(--text-dim);
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .result {
      color: var(--text);
      font-size: 40px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: font-size 0.1s;
      line-height: 1.1;
    }

    /* Buttons */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-row {
      display: grid;
      gap: 8px;
    }
    .btn-row.cols4 { grid-template-columns: repeat(4, 1fr); }
    .btn-row.cols5 { grid-template-columns: repeat(5, 1fr); }

    button {
      border: none;
      border-radius: 12px;
      height: 58px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s ease;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    button:active { transform: scale(0.91); }

    .btn-num {
      background: var(--num-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-num:hover { background: var(--num-hover); }

    .btn-op {
      background: var(--op-bg);
      color: var(--accent2);
      border: 1px solid rgba(168,129,255,0.15);
    }
    .btn-op:hover { background: var(--op-hover); }

    .btn-util {
      background: var(--util-bg);
      color: #90cdf4;
      font-size: 14px;
      border: 1px solid rgba(144,205,244,0.1);
    }
    .btn-util:hover { background: var(--util-hover); }

    .btn-eq {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 22px;
      border: none;
      box-shadow: 0 4px 20px rgba(124,92,191,0.4);
    }
    .btn-eq:hover { box-shadow: 0 4px 28px rgba(168,129,255,0.5); filter: brightness(1.1); }

    .btn-del {
      background: #2a1820;
      color: var(--red);
      border: 1px solid rgba(233,69,96,0.15);
      font-size: 14px;
    }
    .btn-del:hover { background: #3a1c28; }

    .btn-mem {
      background: #1a2a1a;
      color: #6fcf97;
      font-size: 12px;
      border: 1px solid rgba(111,207,151,0.15);
      font-weight: 600;
    }
    .btn-mem:hover { background: #1f371f; }

    .btn-sci {
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 13px;
      border: 1px solid var(--border);
      font-weight: 500;
    }
    .btn-sci:hover { background: var(--op-bg); color: var(--accent2); }

    /* Scientific panel */
    .sci-panel {
      display: none;
    }
    .sci-panel.visible {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .span2 { grid-column: span 2; }

    /* Tooltip on hover for sci buttons */
    .btn-sci[title] { position: relative; }

    /* Copy toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--accent);
      color: #fff;
      padding: 8px 18px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (max-width: 580px) {
      .wrapper { flex-direction: column; align-items: center; }
      .history-panel { width: 300px; max-height: 160px; flex-direction: row; }
      .history-panel h3 { writing-mode: vertical-lr; }
      .history-list { flex-direction: row; overflow-x: auto; overflow-y: hidden; }
      .history-item { min-width: 110px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- History -->
  <div class="history-panel">
    <h3>Histórico</h3>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">Vazio</div>
    </div>
    <button class="btn-clear-hist" onclick="clearHistory()">Limpar</button>
  </div>

  <!-- Calculator -->
  <div class="calc">

    <!-- Mode bar -->
    <div class="mode-bar">
      <div class="mode-toggle">
        <button id="btnBasic" class="active" onclick="setMode('basic')">Básico</button>
        <button id="btnSci" onclick="setMode('sci')">Científico</button>
      </div>
      <button class="angle-toggle" id="angleBtn" onclick="toggleAngle()">DEG</button>
    </div>

    <!-- Display -->
    <div class="display" id="display" data-copy="Copiado!" onclick="copyResult()">
      <div class="memory-indicator" id="memIndicator">M</div>
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Scientific panel -->
    <div class="sci-panel" id="sciPanel">
      <div class="btn-row cols5">
        <button class="btn-sci" onclick="sciFunc('sin')" title="Seno">sin</button>
        <button class="btn-sci" onclick="sciFunc('cos')" title="Cosseno">cos</button>
        <button class="btn-sci" onclick="sciFunc('tan')" title="Tangente">tan</button>
        <button class="btn-sci" onclick="sciFunc('log')" title="Log base 10">log</button>
        <button class="btn-sci" onclick="sciFunc('ln')" title="Log natural">ln</button>
      </div>
      <div class="btn-row cols5">
        <button class="btn-sci" onclick="sciFunc('asin')" title="Arco-seno">sin⁻¹</button>
        <button class="btn-sci" onclick="sciFunc('acos')" title="Arco-cosseno">cos⁻¹</button>
        <button class="btn-sci" onclick="sciFunc('atan')" title="Arco-tangente">tan⁻¹</button>
        <button class="btn-sci" onclick="sciFunc('sqrt')" title="Raiz quadrada">√</button>
        <button class="btn-sci" onclick="sciFunc('cbrt')" title="Raiz cúbica">∛</button>
      </div>
      <div class="btn-row cols5">
        <button class="btn-sci" onclick="sciFunc('sq')" title="Quadrado">x²</button>
        <button class="btn-sci" onclick="sciFunc('cube')" title="Cubo">x³</button>
        <button class="btn-sci" onclick="setOp('^')" title="Potência">xʸ</button>
        <button class="btn-sci" onclick="sciFunc('inv')" title="Inverso">1/x</button>
        <button class="btn-sci" onclick="sciFunc('fact')" title="Fatorial">n!</button>
      </div>
      <div class="btn-row cols5">
        <button class="btn-sci" onclick="inputConst('PI')">π</button>
        <button class="btn-sci" onclick="inputConst('E')">e</button>
        <button class="btn-sci" onclick="sciFunc('abs')" title="Módulo">|x|</button>
        <button class="btn-sci" onclick="sciFunc('floor')" title="Piso">⌊x⌋</button>
        <button class="btn-sci" onclick="sciFunc('ceil')" title="Teto">⌈x⌉</button>
      </div>
    </div>

    <!-- Main buttons -->
    <div class="buttons">

      <!-- Memory row -->
      <div class="btn-row cols4">
        <button class="btn-mem" onclick="memClear()">MC</button>
        <button class="btn-mem" onclick="memRecall()">MR</button>
        <button class="btn-mem" onclick="memAdd()">M+</button>
        <button class="btn-mem" onclick="memSub()">M−</button>
      </div>

      <!-- Util row -->
      <div class="btn-row cols4">
        <button class="btn-util" onclick="clearAll()">AC</button>
        <button class="btn-del" onclick="deleteLast()">⌫</button>
        <button class="btn-util" onclick="percent()">%</button>
        <button class="btn-op" onclick="setOp('/')">÷</button>
      </div>

      <!-- Numbers -->
      <div class="btn-row cols4">
        <button class="btn-num" onclick="input('7')">7</button>
        <button class="btn-num" onclick="input('8')">8</button>
        <button class="btn-num" onclick="input('9')">9</button>
        <button class="btn-op" onclick="setOp('*')">×</button>
      </div>
      <div class="btn-row cols4">
        <button class="btn-num" onclick="input('4')">4</button>
        <button class="btn-num" onclick="input('5')">5</button>
        <button class="btn-num" onclick="input('6')">6</button>
        <button class="btn-op" onclick="setOp('-')">−</button>
      </div>
      <div class="btn-row cols4">
        <button class="btn-num" onclick="input('1')">1</button>
        <button class="btn-num" onclick="input('2')">2</button>
        <button class="btn-num" onclick="input('3')">3</button>
        <button class="btn-op" onclick="setOp('+')">+</button>
      </div>
      <div class="btn-row cols4">
        <button class="btn-util" onclick="toggleSign()">+/−</button>
        <button class="btn-num" onclick="input('0')">0</button>
        <button class="btn-num" onclick="inputDot()">.</button>
        <button class="btn-eq" onclick="calculate()">=</button>
      </div>

    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // State
  let current = '0';
  let previous = '';
  let operator = null;
  let resetNext = false;
  let memory = 0;
  let angleMode = 'deg'; // 'deg' | 'rad'
  let calcMode = 'basic';
  let history = JSON.parse(localStorage.getItem('calc_history') || '[]');

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expression');
  const memEl    = document.getElementById('memIndicator');

  // ─── Display ─────────────────────────────────────────────
  function updateDisplay() {
    const val = current;
    resultEl.textContent = val;
    // shrink font for long numbers
    const len = val.replace(/[^0-9]/g, '').length;
    resultEl.style.fontSize = len > 12 ? '24px' : len > 9 ? '30px' : '40px';
  }

  function updateMemIndicator() {
    memEl.classList.toggle('visible', memory !== 0);
  }

  // ─── Input ───────────────────────────────────────────────
  function input(digit) {
    if (resetNext) { current = digit; resetNext = false; }
    else current = (current === '0' || current === 'Erro') ? digit : current + digit;
    if (current.length > 16) current = current.slice(0, 16);
    updateDisplay();
  }

  function inputDot() {
    if (resetNext) { current = '0.'; resetNext = false; return updateDisplay(); }
    if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function inputConst(name) {
    const val = name === 'PI' ? Math.PI.toString() : Math.E.toString();
    current = val;
    resetNext = false;
    updateDisplay();
  }

  function deleteLast() {
    if (current === 'Erro') { current = '0'; return updateDisplay(); }
    if (current.length > 1) current = current.slice(0, -1);
    else current = '0';
    updateDisplay();
  }

  // ─── Operators ───────────────────────────────────────────
  const SYM = { '/': '÷', '*': '×', '-': '−', '+': '+', '^': '^' };

  function setOp(op) {
    if (current === 'Erro') return;
    if (operator && !resetNext) calculate(true);
    previous = current;
    operator = op;
    resetNext = true;
    exprEl.textContent = formatNum(previous) + ' ' + (SYM[op] || op);
  }

  function calculate(chain = false) {
    if (!operator || !previous) return;
    const a = parseFloat(previous);
    const b = parseFloat(current);
    let res;
    switch (operator) {
      case '+': res = a + b; break;
      case '-': res = a - b; break;
      case '*': res = a * b; break;
      case '/': res = b === 0 ? null : a / b; break;
      case '^': res = Math.pow(a, b); break;
    }
    const exprStr = formatNum(previous) + ' ' + (SYM[operator] || operator) + ' ' + formatNum(current);
    if (!chain) {
      const label = exprStr + ' =';
      exprEl.textContent = label;
      if (res !== null) addHistory(exprStr, formatNum(parseFloat(res.toFixed(10)).toString()));
    }
    if (res === null) { current = 'Erro'; }
    else { current = parseFloat(res.toFixed(10)).toString(); }
    operator = null;
    resetNext = true;
    updateDisplay();
  }

  // ─── Scientific ──────────────────────────────────────────
  function toRad(x) { return angleMode === 'deg' ? x * Math.PI / 180 : x; }
  function fromRad(x) { return angleMode === 'deg' ? x * 180 / Math.PI : x; }

  function sciFunc(fn) {
    const x = parseFloat(current);
    if (isNaN(x)) return;
    let res, label;
    switch (fn) {
      case 'sin':   res = Math.sin(toRad(x));   label = `sin(${formatNum(current)})`; break;
      case 'cos':   res = Math.cos(toRad(x));   label = `cos(${formatNum(current)})`; break;
      case 'tan':   res = Math.tan(toRad(x));   label = `tan(${formatNum(current)})`; break;
      case 'asin':  res = fromRad(Math.asin(x)); label = `sin⁻¹(${formatNum(current)})`; break;
      case 'acos':  res = fromRad(Math.acos(x)); label = `cos⁻¹(${formatNum(current)})`; break;
      case 'atan':  res = fromRad(Math.atan(x)); label = `tan⁻¹(${formatNum(current)})`; break;
      case 'log':   res = Math.log10(x);         label = `log(${formatNum(current)})`; break;
      case 'ln':    res = Math.log(x);            label = `ln(${formatNum(current)})`; break;
      case 'sqrt':  res = Math.sqrt(x);           label = `√(${formatNum(current)})`; break;
      case 'cbrt':  res = Math.cbrt(x);           label = `∛(${formatNum(current)})`; break;
      case 'sq':    res = x * x;                  label = `(${formatNum(current)})²`; break;
      case 'cube':  res = x * x * x;              label = `(${formatNum(current)})³`; break;
      case 'inv':   res = x === 0 ? null : 1/x;  label = `1/(${formatNum(current)})`; break;
      case 'fact':  res = factorial(x);            label = `${formatNum(current)}!`; break;
      case 'abs':   res = Math.abs(x);             label = `|${formatNum(current)}|`; break;
      case 'floor': res = Math.floor(x);           label = `⌊${formatNum(current)}⌋`; break;
      case 'ceil':  res = Math.ceil(x);            label = `⌈${formatNum(current)}⌉`; break;
    }
    if (res === null) { current = 'Erro'; }
    else if (isNaN(res) || !isFinite(res)) { current = 'Erro'; }
    else {
      const resultStr = parseFloat(res.toFixed(10)).toString();
      addHistory(label, formatNum(resultStr));
      exprEl.textContent = label + ' =';
      current = resultStr;
    }
    resetNext = true;
    operator = null;
    updateDisplay();
  }

  function factorial(n) {
    if (n < 0 || !Number.isInteger(n)) return NaN;
    if (n > 170) return Infinity;
    let r = 1;
    for (let i = 2; i <= n; i++) r *= i;
    return r;
  }

  // ─── Utility ─────────────────────────────────────────────
  function clearAll() {
    current = '0'; previous = ''; operator = null; resetNext = false;
    exprEl.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    if (current !== '0' && current !== 'Erro')
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    if (operator && previous) {
      current = (parseFloat(previous) * parseFloat(current) / 100).toString();
    } else {
      current = (parseFloat(current) / 100).toString();
    }
    updateDisplay();
  }

  // ─── Memory ──────────────────────────────────────────────
  function memClear()  { memory = 0; updateMemIndicator(); showToast('Memória limpa'); }
  function memRecall() { if (memory !== 0) { current = memory.toString(); resetNext = false; updateDisplay(); } }
  function memAdd()    { memory += parseFloat(current); updateMemIndicator(); showToast('M = ' + formatNum(memory.toString())); }
  function memSub()    { memory -= parseFloat(current); updateMemIndicator(); showToast('M = ' + formatNum(memory.toString())); }

  // ─── Mode & angle ────────────────────────────────────────
  function setMode(mode) {
    calcMode = mode;
    document.getElementById('btnBasic').classList.toggle('active', mode === 'basic');
    document.getElementById('btnSci').classList.toggle('active', mode === 'sci');
    document.getElementById('sciPanel').classList.toggle('visible', mode === 'sci');
    document.getElementById('angleBtn').style.display = mode === 'sci' ? 'block' : 'none';
  }

  function toggleAngle() {
    angleMode = angleMode === 'deg' ? 'rad' : 'deg';
    document.getElementById('angleBtn').textContent = angleMode.toUpperCase();
    showToast('Modo: ' + angleMode.toUpperCase());
  }

  // ─── History ─────────────────────────────────────────────
  function addHistory(expr, result) {
    history.unshift({ expr, result });
    if (history.length > 50) history.pop();
    localStorage.setItem('calc_history', JSON.stringify(history));
    renderHistory();
  }

  function clearHistory() {
    history = [];
    localStorage.removeItem('calc_history');
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty" id="historyEmpty">Vazio</div>';
      return;
    }
    list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="useHistory(${i})">
        <div class="h-expr">${h.expr}</div>
        <div class="h-result">${h.result}</div>
      </div>
    `).join('');
  }

  function useHistory(i) {
    current = history[i].result.replace(/[,\s]/g, '');
    resetNext = false;
    updateDisplay();
  }

  // ─── Copy ────────────────────────────────────────────────
  function copyResult() {
    if (current === 'Erro') return;
    navigator.clipboard.writeText(current).then(() => showToast('Copiado!'));
  }

  // ─── Toast ───────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ─── Formatting ──────────────────────────────────────────
  function formatNum(s) {
    if (!s || s === 'Erro') return s;
    const n = parseFloat(s);
    if (isNaN(n)) return s;
    if (Math.abs(n) >= 1e15 || (Math.abs(n) < 1e-6 && n !== 0)) return n.toExponential(4);
    return n.toLocaleString('pt-BR', { maximumFractionDigits: 10 });
  }

  // ─── Keyboard ────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') input(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === '^') setOp('^');
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') deleteLast();
    else if (e.key === '%') percent();
  });

  // ─── Init ────────────────────────────────────────────────
  setMode('basic');
  renderHistory();
  updateMemIndicator();
</script>
</body>
</html>
